name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/macula-io/macula-dist-relay

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.1.2'
          rebar3-version: '3.24'

      - name: Install Rust toolchain (for macula QUIC + crypto NIFs)
        uses: dtolnay/rust-toolchain@stable

      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-rebar3-${{ hashFiles('rebar.config', 'src/**') }}
          restore-keys: ${{ runner.os }}-rebar3-

      - name: Fetch dependencies
        run: rebar3 get-deps

      - name: Compile (warnings_as_errors)
        run: rebar3 compile

      - name: Run eunit
        run: rebar3 eunit

      # NOTE: dist_relay_SUITE (Common Test) is NOT run in CI yet.
      # It requires the macula SDK's dist_relay_client module, which is
      # only on main (not yet published to hex). Once SDK v1.4.26 ships
      # with the client, add `rebar3 ct` here and drop the _checkouts/
      # override developers use locally.

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
